<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="7" fill="#0e1525"/>

  <!-- Stylized "U" shape formed by a candlestick + curve -->
  <!-- Left bar (candlestick wick) -->
  <line x1="10" y1="6" x2="10" y2="22" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left candle body -->
  <rect x="7.5" y="10" width="5" height="8" rx="1.5" fill="#3b82f6"/>

  <!-- Bottom curve connecting left to right (the U shape) -->
  <path d="M10 22 C10 27, 22 27, 22 22" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Right bar (rising candlestick) -->
  <line x1="22" y1="8" x2="22" y2="22" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right candle body (hollow/outline = bullish) -->
  <rect x="19.5" y="12" width="5" height="6" rx="1.5" stroke="#60a5fa" stroke-width="1.5" fill="none"/>

  <!-- Small accent dot (AI/agent node) -->
  <circle cx="16" cy="26" r="2" fill="#d97757"/>
</svg>
