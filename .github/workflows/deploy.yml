name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  BACKEND_SERVICE: uteki-backend
  FRONTEND_SERVICE: uteki-frontend
  # Force all JS actions onto Node.js 24 — avoids the Node 20 deprecation warning
  # regardless of which action major versions happen to be pinned below.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: backend
        run: poetry install --no-interaction --no-root

      - name: Ruff (advisory — non-blocking; surfaces as PR annotations)
        working-directory: backend
        continue-on-error: true
        run: poetry run ruff check . --output-format=github

      - name: Run tests
        working-directory: backend
        env:
          ENVIRONMENT: development
          DATABASE_TYPE: sqlite
          SECRET_KEY: ci-test-secret-key
        run: poetry run pytest --tb=short -q

  lint-frontend:
    name: Lint Frontend (advisory)
    runs-on: ubuntu-latest
    # Advisory job — never blocks the workflow, even if setup or lint breaks.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # cache: pnpm disabled — pnpm-action-setup's store path confuses
          # setup-node's cache resolution ("Some specified paths were not
          # resolved"). Cost is ~20s extra install; acceptable for advisory.

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint (advisory — does not block deploy)
        working-directory: frontend
        continue-on-error: true
        run: pnpm lint

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev

      - name: Build Docker image
        run: |
          cd backend
          docker build -t $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$BACKEND_SERVICE/$BACKEND_SERVICE:$GITHUB_SHA .
          docker push $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$BACKEND_SERVICE/$BACKEND_SERVICE:$GITHUB_SHA

      - name: Get Backend URL for OAuth
        id: backend-url
        run: |
          # First deployment may not have URL yet, use placeholder
          URL=$(gcloud run services describe $BACKEND_SERVICE --region $GCP_REGION --format 'value(status.url)' 2>/dev/null || echo "https://$BACKEND_SERVICE-placeholder.run.app")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$BACKEND_SERVICE/$BACKEND_SERVICE:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production,DATABASE_TYPE=postgresql,POSTGRES_HOST=db.iyxaqxfrwklmpwhkdbug.supabase.co,POSTGRES_PORT=5432,POSTGRES_USER=postgres,POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }},POSTGRES_DB=postgres,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }},DEBUG=false,GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }},GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }},SECRET_KEY=${{ secrets.SECRET_KEY }},OAUTH_REDIRECT_BASE=${{ steps.backend-url.outputs.url }},GOOGLE_SEARCH_API_KEY=${{ secrets.GOOGLE_SEARCH_API_KEY }},GOOGLE_SEARCH_ENGINE_ID=${{ secrets.GOOGLE_SEARCH_ENGINE_ID }},ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }},FRONTEND_URL=${{ secrets.FRONTEND_URL }},CORS_ORIGINS=${{ secrets.FRONTEND_URL }},REDIS_URL_OVERRIDE=${{ secrets.REDIS_URL_OVERRIDE }},FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
            --memory 1Gi \
            --cpu 2 \
            --cpu-boost \
            --max-instances 10 \
            --min-instances 0 \
            --timeout 300 \
            --port 8080

      - name: Get Final Backend URL
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE --region $GCP_REGION --format 'value(status.url)')
          echo "Backend deployed to: $URL"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev

      - name: Get Backend URL
        id: get-backend-url
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE --region $GCP_REGION --format 'value(status.url)')
          echo "backend_url=$URL" >> $GITHUB_OUTPUT

      - name: Build Docker image with API URL
        run: |
          cd frontend
          docker build \
            --build-arg VITE_API_URL=${{ steps.get-backend-url.outputs.backend_url }} \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            --build-arg VITE_GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }} \
            -t $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$FRONTEND_SERVICE/$FRONTEND_SERVICE:$GITHUB_SHA .
          docker push $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$FRONTEND_SERVICE/$FRONTEND_SERVICE:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$FRONTEND_SERVICE/$FRONTEND_SERVICE:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --max-instances 5

      - name: Get Frontend URL
        run: |
          URL=$(gcloud run services describe $FRONTEND_SERVICE --region $GCP_REGION --format 'value(status.url)')
          echo "Frontend deployed to: $URL"
          echo "🚀 Deployment complete! Visit: $URL"
